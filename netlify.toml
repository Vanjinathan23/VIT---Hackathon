[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "VITE_GOOGLE_MAPS_API_KEY,VITE_WEATHER_API_KEY,VITE_GEMINI_API_KEY"

# Route all /api/* requests to the Express serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback – all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
